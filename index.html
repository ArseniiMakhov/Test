<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow&display=swap" rel="stylesheet">
    <title>Iintoo</title>
</head>
<body>
    <main class="main">
        <section class="logo-half">
            <img src="images/logo.svg" alt="" class="logo">
        </section>
        <section class="form-half">
            <h1 class="form__title">Get iinto it today</h1>
            <h3 class="disclaimer">There is no charge or obligation upon registration.</h3>
            <div class="network-links">
                <a class="facebook link" href="#">
                    <img src="images/facebook.svg" alt="" class="link__img">
                    <p class="link__text">Register with Facebook</p>
                </a>
                <a class="linkedin link" href="#">
                    <img src="images/linkedin.svg" alt="" class="link__img">
                    <p class="link__text">Register with LinkedIn</p>
                </a>
            </div>
            <p class="or">or</p>
        </section>
    </main>
</body>
</html>
