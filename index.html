<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow&display=swap" rel="stylesheet">
    <title>Iintoo</title>
</head>
<body>
    <main class="main">
        <section class="logo-half">
            <img src="images/logo.svg" alt="" class="logo">
        </section>
        <section class="form-half">
            <h1 class="form__title">Get iinto it today</h1>
            <h3 class="form__disclaimer">There is no charge or obligation upon registration.</h3>
            <div class="network-links">
                <a class="facebook link" href="#">
                    <img src="images/facebook.svg" alt="" class="link__img">
                    <p class="link__text">Register with Facebook</p>
                </a>
                <a class="linkedin link" href="#">
                    <img src="images/linkedin.svg" alt="" class="link__img">
                    <p class="link__text">Register with LinkedIn</p>
                </a>
            </div>
            <p class="or">or</p>
            <form class="form" action="" method="post">
                <div class="form__person">
                <label class="person__label" for="email"> Email
                    <input class="text-input" id="email" type="text">
                </label>
                <label class="person__label" for="phone"> Phone
                    <input class="text-input" id="phone" type="text">
                </label>
                </div>
                <h2 class="form__title">What type of investor are you?</h2>
                <h4 class="form__disclaimer">Select the type of investor you are below.</h4>
                <div class="form__investor">
                    <label for="Individual" class="radio">
                        <input type="radio" class="radio__input" id="Individual" name="radio" value="Individual">
                        <span class="radio__circle"></span>
                        Individual
                        <img class="radio__info" src="images/icons8-информация-24.png" alt="">
                        <p class="description">
                            I am a natural person investingon my own behalf as a soleowner, joint tenant, or tenantin common.
                        </p>
                    </label>
                    <label for="Business" class="radio">
                        <input type="radio" class="radio__input" id="Business" name="radio" value="Business">
                        <span class="radio__circle"></span>
                        Business
                        <img class="radio__info" src="images/icons8-информация-24.png" alt="">
                        <p class="description">
                            I am a natural person investingon my own behalf as a soleowner, joint tenant, or tenantin common.
                        </p>
                    </label>
                    <label for="IRA" class="radio">
                        <input type="radio" class="radio__input" id="IRA" name="radio" value="IRA">
                        <span class="radio__circle"></span>
                        IRA
                        <img class="radio__info" src="images/icons8-информация-24.png" alt="">
                        <p class="description">
                            I am a natural person investingon my own behalf as a soleowner, joint tenant, or tenantin common.
                        </p>
                    </label>
                    <label for="Trust" class="radio">
                        <input type="radio" class="radio__input" id="Trust" name="radio" value="Trust">
                        <span class="radio__circle"></span>
                        Trust
                        <img class="radio__info" src="images/icons8-информация-24.png" alt="">
                        <p class="description">
                            I am a natural person investingon my own behalf as a soleowner, joint tenant, or tenantin common.
                        </p>
                    </label>
                </div>
                <label for="agree" class="check">
                    <input type="checkbox" class="check__input" id="agree">
                    <span class="check__box" ></span>
                    I agree to the terms and receiving notifications from iintoo <a class="check__link" href="#">View full terms</a>
                </label>
                <button class="submit-btn" type="submit">Create Account</button>
            </form>
        </section>
    </main>
</body>
</html>
